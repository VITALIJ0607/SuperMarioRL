# Docker Compose für Super Mario RL Training
version: '3.8'

services:
  training:
    build: .
    container_name: super_mario_rl_training
    volumes:
      # Persistiere trainierte Models
      - ./models:/app/models
      - ./logs:/app/logs
      - ./ppo_mario_tensorboard:/app/ppo_mario_tensorboard
    environment:
      - PYTHONUNBUFFERED=1
    # Optional: GPU Support (benötigt nvidia-docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    
  tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: super_mario_rl_tensorboard
    ports:
      - "6006:6006"
    volumes:
      - ./ppo_mario_tensorboard:/logs
    command: tensorboard --logdir=/logs --host=0.0.0.0
    depends_on:
      - training
